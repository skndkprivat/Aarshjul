<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Årshjul</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F3F5F6;
    --surface:#FFFFFF;
    --ink:#1B2430;
    --ink-soft:#5B6672;
    --border:#DDE3E6;
    --accent:#2F6F5E;
    --accent-soft:#E4EFEC;
    --danger:#B3452C;
    --danger-soft:#F7E9E5;
    --radius:10px;
    --shadow:0 1px 2px rgba(27,36,48,.06), 0 8px 24px -12px rgba(27,36,48,.12);
    --font-display:'Space Grotesk',system-ui,sans-serif;
    --font-body:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{font-family:var(--font-display);letter-spacing:-0.01em;}
  button{font-family:inherit;}
  .app{min-height:100vh;display:flex;flex-direction:column;}
  .hidden{display:none !important;}

  /* ---------- Top bar (shown once logged in) ---------- */
  .topbar{
    display:flex;align-items:center;gap:16px;
    padding:14px 24px;background:var(--surface);
    border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:20;
  }
  .topbar .brand{font-family:var(--font-display);font-weight:700;font-size:1.05rem;display:flex;align-items:center;gap:10px;}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);}
  .topbar .spacer{flex:1;}
  .select{
    appearance:none;background:var(--bg);border:1px solid var(--border);
    border-radius:8px;padding:8px 32px 8px 12px;font-size:.9rem;color:var(--ink);
    font-weight:600;cursor:pointer;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%235B6672' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat:no-repeat;background-position:right 10px center;
  }
  .btn{
    border:1px solid var(--border);background:var(--surface);color:var(--ink);
    padding:8px 14px;border-radius:8px;font-size:.88rem;font-weight:600;
    cursor:pointer;transition:.15s ease;display:inline-flex;align-items:center;gap:6px;
  }
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn:focus-visible, select:focus-visible, input:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .btn.primary:hover{filter:brightness(1.08);color:#fff;}
  .btn.danger{color:var(--danger);border-color:var(--danger-soft);}
  .btn.danger:hover{border-color:var(--danger);}
  .btn.small{padding:5px 10px;font-size:.78rem;}
  .badge{
    font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
    padding:3px 8px;border-radius:100px;background:var(--accent-soft);color:var(--accent);
  }

  /* ---------- Centered auth screens ---------- */
  .auth-wrap{
    flex:1;display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .auth-card{
    background:var(--surface);border:1px solid var(--border);border-radius:16px;
    box-shadow:var(--shadow);padding:36px 32px;width:100%;max-width:400px;
  }
  .auth-card h1{font-size:1.4rem;margin:0 0 4px;}
  .auth-card .sub{color:var(--ink-soft);font-size:.9rem;margin:0 0 24px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:.8rem;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
  .field input{
    width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;
    font-size:.95rem;font-family:inherit;background:var(--bg);color:var(--ink);
  }
  .field input:focus{background:var(--surface);}
  .auth-card .btn.primary{width:100%;justify-content:center;padding:11px;font-size:.95rem;margin-top:6px;}
  .error-msg{
    background:var(--danger-soft);color:var(--danger);border-radius:8px;padding:10px 12px;
    font-size:.85rem;margin-bottom:16px;display:flex;gap:8px;align-items:flex-start;
  }
  .customer-list{display:flex;flex-direction:column;gap:8px;}
  .customer-item{
    display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--border);
    border-radius:10px;cursor:pointer;background:var(--bg);text-align:left;width:100%;
    font-family:inherit;font-size:.92rem;font-weight:600;color:var(--ink);
  }
  .customer-item:hover{border-color:var(--accent);}
  .customer-item .swatch{width:14px;height:14px;border-radius:4px;flex-shrink:0;}
  .back-link{background:none;border:none;color:var(--ink-soft);font-size:.85rem;cursor:pointer;padding:0;margin-bottom:18px;display:inline-flex;align-items:center;gap:4px;}
  .back-link:hover{color:var(--accent);}
  .lang-toggle{
    position:fixed;top:16px;right:16px;display:flex;gap:2px;background:var(--surface);
    border:1px solid var(--border);border-radius:100px;padding:3px;z-index:30;
  }
  .lang-toggle button{
    border:none;background:none;padding:5px 12px;border-radius:100px;font-size:.78rem;
    font-weight:700;cursor:pointer;color:var(--ink-soft);
  }
  .lang-toggle button.active{background:var(--accent);color:#fff;}

  /* ---------- Dashboard ---------- */
  .dashboard{flex:1;display:flex;flex-direction:column;padding:28px 24px 60px;max-width:1180px;margin:0 auto;width:100%;}
  .dash-head{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:22px;}
  .dash-head h1{font-size:1.6rem;margin:0;}
  .dash-head .meta{color:var(--ink-soft);font-size:.88rem;margin-top:4px;}
  .layout{display:grid;grid-template-columns:minmax(320px,460px) 1fr;gap:28px;align-items:start;}
  @media (max-width: 860px){ .layout{grid-template-columns:1fr;} }

  .wheel-card, .list-card{
    background:var(--surface);border:1px solid var(--border);border-radius:16px;
    box-shadow:var(--shadow);padding:20px;
  }
  .wheel-card{position:sticky;top:86px;}
  @media (max-width: 860px){ .wheel-card{position:static;} }
  .wheel-card svg{width:100%;height:auto;display:block;}
  .wheel-card .hint{text-align:center;color:var(--ink-soft);font-size:.78rem;margin-top:10px;}

  .list-card h2{font-size:1.05rem;margin:0 0 4px;}
  .list-card .sub{color:var(--ink-soft);font-size:.85rem;margin:0 0 16px;}
  .month-group{margin-bottom:18px;}
  .month-group summary{
    cursor:pointer;list-style:none;display:flex;align-items:center;gap:10px;
    font-family:var(--font-display);font-weight:600;font-size:.95rem;padding:8px 0;
    border-bottom:1px solid var(--border);
  }
  .month-group summary::-webkit-details-marker{display:none;}
  .month-group summary .m-dot{width:10px;height:10px;border-radius:3px;}
  .month-group summary::after{content:'▾';margin-left:auto;color:var(--ink-soft);font-size:.75rem;}
  .month-group[open] summary::after{content:'▴';}
  .activity-row{
    display:flex;align-items:flex-start;gap:10px;padding:12px 4px;border-bottom:1px dashed var(--border);
  }
  .activity-row:last-child{border-bottom:none;}
  .activity-row .a-main{flex:1;min-width:0;}
  .activity-row .a-name{font-weight:600;font-size:.92rem;}
  .activity-row .a-meta{color:var(--ink-soft);font-size:.8rem;margin-top:2px;}
  .activity-row .a-actions{display:flex;gap:6px;flex-shrink:0;}
  .empty-state{color:var(--ink-soft);font-size:.85rem;padding:16px 4px;text-align:center;}

  .add-row{margin-top:8px;}

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(27,36,48,.45);display:flex;
    align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .modal{
    background:var(--surface);border-radius:16px;box-shadow:var(--shadow);
    padding:28px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;
  }
  .modal h2{font-size:1.1rem;margin:0 0 18px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}

  .footer-note{
    text-align:center;color:var(--ink-soft);font-size:.75rem;padding:20px;
  }

  @media print{
    .topbar,.lang-toggle,.list-card,.footer-note,.a-actions,.add-row{display:none !important;}
    .layout{grid-template-columns:1fr;}
    .wheel-card{box-shadow:none;border:none;position:static;}
  }
</style>
</head>
<body>
<div class="lang-toggle" id="langToggle">
  <button data-lang="da" class="active">DA</button>
  <button data-lang="en">EN</button>
</div>

<div class="app" id="app">

  <!-- ======= STEP 1: Vælg kunde ======= -->
  <section class="auth-wrap" id="screen-customer">
    <div class="auth-card">
      <h1 data-i18n="pickCustomerTitle">Vælg kunde</h1>
      <p class="sub" data-i18n="pickCustomerSub">Vælg hvilken kundes årshjul du vil åbne.</p>
      <div id="errorCustomer"></div>
      <div class="customer-list" id="customerList"></div>
    </div>
  </section>

  <!-- ======= STEP 2: Login ======= -->
  <section class="auth-wrap hidden" id="screen-login">
    <div class="auth-card">
      <button class="back-link" id="backToCustomers">← <span data-i18n="back">Tilbage</span></button>
      <h1 id="loginTitle" data-i18n="loginTitle">Log ind</h1>
      <p class="sub" id="loginSub"></p>
      <div id="errorLogin"></div>
      <form id="loginForm">
        <div class="field">
          <label data-i18n="username">Brugernavn</label>
          <input type="text" id="loginUsername" autocomplete="username" required>
        </div>
        <div class="field">
          <label data-i18n="password">Adgangskode</label>
          <input type="password" id="loginPassword" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn primary" id="loginSubmit" data-i18n="login">Log ind</button>
      </form>
    </div>
  </section>

  <!-- ======= STEP 3: Dashboard ======= -->
  <div class="hidden" id="screen-dashboard">
    <div class="topbar">
      <div class="brand"><span class="dot" id="brandDot"></span><span id="brandName">—</span></div>
      <span class="badge" id="roleBadge"></span>
      <div class="spacer"></div>
      <select class="select" id="yearSelect"></select>
      <button class="btn small" id="printBtn" data-i18n="print">🖶 Print</button>
      <button class="btn small" id="switchCustomerBtn" data-i18n="switchCustomer">Skift kunde</button>
      <button class="btn small" id="logoutBtn" data-i18n="logout">Log ud</button>
    </div>

    <div class="dashboard">
      <div class="dash-head">
        <div>
          <h1 id="wheelTitle">Årshjul</h1>
          <div class="meta" id="wheelMeta"></div>
        </div>
        <div id="adminTools" class="hidden" style="display:flex;gap:8px;">
          <button class="btn small" id="manageUsersBtn" data-i18n="manageUsers">👥 Brugere</button>
          <button class="btn small" id="manageYearsBtn" data-i18n="manageYears">🗓️ År</button>
          <button class="btn small" id="exportJsonBtn" data-i18n="exportJson">⬇ Eksportér JSON</button>
        </div>
      </div>

      <div class="layout">
        <div class="wheel-card">
          <svg id="wheelSvg" viewBox="0 0 460 460"></svg>
          <p class="hint" data-i18n="wheelHint">Klik på en måned for at folde aktiviteterne ud.</p>
        </div>

        <div class="list-card">
          <h2 data-i18n="activitiesTitle">Aktiviteter</h2>
          <p class="sub" data-i18n="activitiesSub">Åbn en måned for at se og redigere aktiviteter.</p>
          <div id="monthGroups"></div>
        </div>
      </div>
    </div>

    <p class="footer-note" id="footerNote"></p>
  </div>

</div>

<div id="modalRoot"></div>

<script src="app.js"></script>
</body>
</html>
